<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004F3F">
    <title>Muslim Pro - Bastia Umbra</title>
    <style>
        :root {
            --mp-dark: #004F3F;
            --mp-gold: #C5A059;
            --mp-bg: #F4F6F8;
            --white: #ffffff;
        }

        /* RESET */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            border: none; outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--mp-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; color: #333;
        }

        /* HEADER */
        .header {
            width: 100%; background: var(--mp-dark);
            padding: 30px 0; text-align: center;
            border-bottom: 4px solid var(--mp-gold);
            position: relative; flex-shrink: 0;
        }
        .ramadan-title { color: var(--mp-gold); font-size: 28px; font-weight: 900; }
        .menu-btn { position: absolute; left: 20px; top: 20px; color: var(--mp-gold); font-size: 30px; cursor: pointer; z-index: 100; }

        /* DASHBOARD */
        .dashboard {
            width: 92%; max-width: 500px; margin: -25px 0 15px 0; 
            display: flex; gap: 12px; z-index: 10; flex-shrink: 0;
        }
        .dash-card {
            flex: 1; background: var(--white); border-radius: 20px; padding: 15px;
            border: 1.5px solid var(--mp-gold); text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .timer-main { font-size: 24px; font-weight: 900; color: var(--mp-dark); }
        .date-hijri { font-size: 14px; font-weight: 900; color: var(--mp-dark); margin-top: 5px; display: block; }

        /* LISTA PREGHIERE */
        .prayer-list { width: 94%; flex-grow: 1; overflow-y: auto; padding: 10px 5px; display: flex; flex-direction: column; gap: 12px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 18px 25px; border-radius: 20px;
        }
        .prayer-card.active { border: 2.5px solid var(--mp-gold); background: #fffcf5; }
        .p-right { display: flex; align-items: center; gap: 18px; }
        .p-name { font-size: 22px; font-weight: 800; color: var(--mp-dark); }
        .p-icon { font-size: 28px; }
        .p-time { font-size: 24px; font-weight: 900; color: #222; }

        /* INFINITE TICKER HADITH (SINISTRA -> DESTRA) */
        .hadith-footer {
            width: 100%; background: var(--mp-dark);
            padding: 15px 0; border-top: 3px solid var(--mp-gold);
            overflow: hidden; flex-shrink: 0;
            position: relative; direction: ltr !important;
        }
        .hadith-wrap {
            display: flex; width: max-content;
            animation: infinite-scroll 120s linear infinite;
        }
        .hadith-text {
            color: var(--mp-gold); font-weight: 600; font-size: 15px;
            padding: 0 40px; white-space: nowrap; direction: rtl;
        }
        @keyframes infinite-scroll {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -330px; width: 310px; height: 100%;
            background: var(--mp-dark); z-index: 2000; transition: 0.5s;
            padding: 40px 25px; color: white;
        }
        .sidebar.open { left: 0; }
        .sidebar h2 { color: var(--mp-gold); border-bottom: 1px solid var(--mp-gold); padding-bottom: 10px; margin-bottom: 20px; }
        .mp-select, .mp-btn { width: 100%; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; font-size: 16px; }
        .mp-select { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--mp-gold); }
        .mp-btn { cursor: pointer; text-align: center; }
        .btn-gold { background: var(--mp-gold); color: var(--mp-dark); }
    </style>
</head>
<body onclick="unlockAudio()">

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="header">
        <h1 class="ramadan-title">رمضان مبارك</h1>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Impostazioni</h2>
        <p style="font-size: 12px; color: #ccc;">Attiva le notifiche per ricevere il banner automatico all'ora della preghiera.</p>
        
        <label style="color:var(--mp-gold); margin-top: 20px; display: block;">🔔 Tipo Allarme</label>
        <select id="notif-type" class="mp-select">
            <option value="athan">Athan Completo</option>
            <option value="bip">Solo Bip Notifica</option>
        </select>

        <button class="mp-btn btn-gold" onclick="requestNotifPermission()">ATTIVA NOTIFICHE BANNER</button>
        <button class="mp-btn" style="background:white; color:black;" onclick="testNotif()">TEST BANNER</button>
        <button class="mp-btn" style="background:transparent; color:white; border:1px solid white;" onclick="toggleMenu()">CHIUDI</button>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="dash-card">
            <small style="color:#888;">Data</small>
            <span class="date-hijri">13 رمضان 1447</span>
            <span style="font-size:11px; color:#666;" id="g-date">--/--/----</span>
        </div>
        <div class="dash-card">
            <small style="color:#888;" id="next-name">Caricamento...</small>
            <div class="timer-main" id="timer-next">00:00:00</div>
        </div>
    </div>

    <!-- PRAYER LIST -->
    <div class="prayer-list" id="list-container"></div>

    <!-- TICKER HADITH -->
    <div class="hadith-footer">
        <div class="hadith-wrap" id="hadith-track">
            <!-- Popolato via JS -->
        </div>
    </div>

    <script>
        const times = { f:"05:27", dh:"12:24", a:"15:29", m:"18:00", i:"19:19" };
        const pNames = { f:"الفجر", dh:"الظهر", a:"العصر", m:"المغرب", i:"العشاء" };
        const pIcons = { f:"🌅", dh:"☀️", a:"🌤️", m:"🌇", i:"🌙" };

        const hadithList = [
            "1. إنما الأعمال بالنيات - Le azioni dipendono dalle intenzioni",
            "2. بني الإسلام على خمس - L'Islam si basa su cinque pilastri",
            "3. الدين النصيحة - La religione è consiglio",
            "4. الحلال بين والحرام بين - Il lecito è chiaro e l'illecito è chiaro",
            "5. من أحدث في أمرنا هذا ما ليس منه فهو رد - Chi introduce novità nel nostro affare sarà respinto",
            "6. اتق الله حيثما كنت - Temi Allah ovunque tu sia",
            "7. إن الله طيب لا يقبل إلا طيبا - Allah è Puro e accetta solo ciò che è puro",
            "8. لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه - Nessuno di voi è credente finché non ama per suo fratello ciò che ama per se stesso",
            "9. من كان يؤمن بالله واليوم الآخر فليقل خيرا أو ليصمت - Chi crede in Allah e nell'Ultimo Giorno dica il bene o taccia",
            "10. لا تغضب - Non arrabbiarti",
            "11. إن الله كتب الإحسان على كل شيء - Allah ha prescritto l'eccellenza in ogni cosa",
            "12. من حسن إسلام المرء تركه ما لا يعنيه - Parte della bellezza dell'Islam di una persona è lasciare ciò che non la riguarda",
            "13. لا ضرر ولا ضرار - Non recare danno né riceverlo",
            "14. لو يعطى الناس بدعواهم - Se alle persone venisse dato ciò che pretendono",
            "15. من رأى منكم منكرا فليغيره بيده - Chi di voi vede un male lo cambi con la sua mano",
            "16. لا تحاسدوا ولا تناجشوا - Non invidiatevi e non ingannatevi",
            "17. المؤمن قوي خير وأحب إلى الله من المؤمن الضعيف - Il credente forte è migliore del credente debole",
            "18. البر حسن الخلق - La rettitudine è il buon carattere",
            "19. الصلاة نور والصدقة برهان - La preghiera è luce e la carità è prova",
            "20. احفظ الله يحفظك - Preserva Allah ed Egli ti preserverà"
        ]; // Ho inserito i primi 20 per brevità qui, ma il sistema li raddoppia per l'infinito.

        let audioUnlocked = false;
        function unlockAudio() { audioUnlocked = true; }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        // --- GESTIONE NOTIFICHE ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log("Service Worker Registrato correttamente.");
            });
        }

        function requestNotifPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("✅ Notifiche Banner Attivate!");
                }
            });
            toggleMenu();
        }

        function sendBanner(title, body) {
            if (Notification.permission === "granted") {
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification(title, {
                        body: body,
                        icon: 'https://cdn-icons-png.flaticon.com/512/2619/2619277.png',
                        badge: 'https://cdn-icons-png.flaticon.com/512/2619/2619277.png',
                        vibrate: [300, 100, 300],
                        requireInteraction: true,
                        tag: 'prayer-time'
                    });
                });
            }
            // Suono
            const mode = document.getElementById('notif-type').value;
            const audio = new Audio(mode === 'athan' ? "https://www.islamcan.com/audio/adhan/azan1.mp3" : "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
            if(audioUnlocked) audio.play();
        }

        function testNotif() {
            sendBanner("Muslim Pro Bastia", "Test del Banner: È ora della preghiera!");
        }

        // --- LOGICA AGGIORNAMENTO ---
        function update() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            const sec = now.getSeconds();
            document.getElementById('g-date').innerText = now.toLocaleDateString('it-IT');

            let html = ""; let nextP = null; let nextN = "";
            let keys = Object.keys(times);

            keys.forEach(k => {
                const [h,m] = times[k].split(":");
                const pDate = new Date(); pDate.setHours(h,m,0);
                let active = (timeStr === times[k]);

                if (timeStr === times[k] && sec === 0 && window.lastT !== k) {
                    window.lastT = k;
                    sendBanner("حَانَ الآنَ مَوْعِدُ صَلَاةِ " + pNames[k], "È ora della preghiera a Bastia Umbra");
                }
                if (pDate > now && !nextP) { nextP = pDate; nextN = pNames[k]; }

                html += `<div class="prayer-card ${active ? 'active' : ''}">
                    <span class="p-time">${times[k]}</span>
                    <div class="p-right">
                        <span class="p-name">${pNames[k]}</span>
                        <span class="p-icon">${pIcons[k]}</span>
                    </div>
                </div>`;
            });

            if (!nextP) {
                const [fh, fm] = times.f.split(":");
                nextP = new Date(); nextP.setDate(now.getDate() + 1); nextP.setHours(fh, fm, 0);
                nextN = pNames.f;
            }

            const diff = nextP - now;
            const hh = Math.floor(diff/3600000).toString().padStart(2,"0");
            const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,"0");
            const ss = Math.floor((diff%60000)/1000).toString().padStart(2,"0");
            
            document.getElementById('timer-next').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('next-name').innerText = "الصلاة القادمة: " + nextN;
            document.getElementById('list-container').innerHTML = html;
        }

        // --- SETUP HADITH INFINITI ---
        const hTrack = document.getElementById('hadith-track');
        // Raddoppiamo la lista per creare l'effetto senza fine
        const fullContent = [...hadithList, ...hadithList].map(text => `<span class="hadith-text">${text}</span>`).join('');
        hTrack.innerHTML = fullContent;

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
