<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#004F3F">
    <title>Muslim Pro Harmony - Bastia</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;700;900&display=swap');

        :root {
            --mp-dark: #004F3F; --mp-gold: #C5A059; --mp-bg: #F8F9FA; --white: #ffffff;
            --text-main: #1A1A1A; --text-sub: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--mp-bg);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; color: var(--text-main);
        }

        /* HEADER & ANIMAZIONE SHIMMER */
        .header {
            width: 100%; background: var(--mp-dark);
            padding: 40px 0 20px 0; text-align: center;
            border-bottom: 3px solid var(--mp-gold);
            flex-shrink: 0; position: relative;
        }
        .ramadan-title { 
            font-family: 'Amiri', serif; color: var(--mp-gold); font-size: 32px; 
            background: linear-gradient(to right, #C5A059 20%, #FFF 50%, #C5A059 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        
        .menu-btn { position: absolute; left: 20px; top: 42px; color: var(--mp-gold); font-size: 28px; cursor: pointer; z-index: 101; }
        .dynamic-greeting { color: white; font-size: 12px; opacity: 0.7; margin-top: 2px; }

        /* DASHBOARD - DESIGN EQUILIBRATO */
        .dashboard {
            width: 92%; margin: 15px auto;
            background: var(--white); border-radius: 24px;
            padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .dash-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .dash-left { text-align: right; }
        .dash-right { text-align: left; }
        
        .timer-label { font-size: 11px; font-weight: 800; color: var(--mp-gold); text-transform: uppercase; letter-spacing: 0.5px; }
        .timer-main { font-size: 34px; font-weight: 900; color: var(--mp-dark); letter-spacing: -1px; margin-top: 2px; }
        
        .date-hijri { font-size: 16px; font-weight: 700; color: var(--mp-dark); display: block; }
        .date-gregorian { font-size: 11px; color: var(--text-sub); }
        .city-rotation { font-size: 12px; font-weight: 700; color: var(--mp-gold); margin-top: 5px; }

        .progress-container { width: 100%; background: #E9ECEF; height: 4px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-bar { width: 0%; height: 100%; background: var(--mp-gold); transition: width 1s linear; }

        /* AYA DEL GIORNO */
        .aya-strip { width: 92%; margin: 0 auto 10px auto; background: #FFF9EE; padding: 12px; border-radius: 14px; text-align: center; border: 1px solid #F3E5D0; flex-shrink: 0; }
        .aya-ar { font-family: 'Amiri', serif; font-size: 15px; color: var(--mp-dark); }

        /* PRAYER LIST */
        .prayer-list { width: 92%; margin: 0 auto; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 18px 22px; border-radius: 20px;
            transition: 0.3s; border: 1px solid transparent;
        }
        .prayer-card.active { border-color: var(--mp-gold); background: #FFFCF5; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.1); }
        .p-right { display: flex; align-items: center; gap: 18px; }
        .p-name { font-size: 18px; font-weight: 700; color: var(--mp-dark); }
        .p-time { font-size: 20px; font-weight: 900; color: #333; }
        .p-icon { font-size: 24px; opacity: 0.8; }

        /* HADITH STRIP */
        .hadith-footer { width: 100%; background: var(--mp-dark); padding: 12px 0; border-top: 2px solid var(--mp-gold); overflow: hidden; flex-shrink: 0; direction: ltr !important; }
        .hadith-track { display: flex; width: max-content; animation: marquee-rtl 280s linear infinite; }
        .hadith-text { color: var(--mp-gold); font-weight: 600; font-size: 13px; padding: 0 60px; direction: rtl; white-space: nowrap; }

        @keyframes marquee-rtl { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* SIDEBAR & MODALS */
        .sidebar { position: fixed; top: 0; left: -310px; width: 310px; height: 100%; background: var(--mp-dark); z-index: 2000; transition: 0.4s; padding: 40px 20px; color: white; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar h2 { color: var(--mp-gold); margin-bottom: 25px; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 10px; }
        .mp-btn { width: 100%; padding: 14px; border-radius: 14px; margin-top: 10px; font-weight: 700; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
        .btn-gold { background: var(--mp-gold); color: var(--mp-dark); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .modal-card { background: var(--mp-dark); width: 90%; max-width: 450px; padding: 25px; border-radius: 28px; border: 1px solid var(--mp-gold); text-align: center; max-height: 85vh; overflow-y: auto; }

        /* COMPASS & TASBIH */
        .compass-ui { width: 200px; height: 200px; margin: 0 auto; border: 3px solid var(--mp-gold); border-radius: 50%; position: relative; background: #002b22; }
        #compass-disk { width: 100%; height: 100%; background: url('icon.png') center/cover; border-radius: 50%; transition: transform 0.1s linear; }
        .qibla-indicator { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: red; font-size: 30px; z-index: 10; }
        .tasbih-display { font-size: 60px; font-weight: 900; color: var(--mp-gold); margin: 20px 0; }
        .tasbih-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--mp-gold); color: var(--mp-dark); display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body onclick="unlockAudio(); startWakeLock();">

    <audio id="silent-audio" loop><source src="https://github.com/anars/blank-audio/raw/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="header">
        <h1 class="ramadan-title">رمضان مبارك</h1>
        <div id="greeting" class="dynamic-greeting">السلام عليكم</div>
    </div>

    <!-- DASHBOARD HARMONY -->
    <div class="dashboard">
        <div class="dash-top">
            <div class="dash-left">
                <div class="timer-label" id="next-name">PROSSIMA PREGHIERA</div>
                <div class="timer-main" id="timer-next">00:00:00</div>
            </div>
            <div class="dash-right">
                <span class="date-hijri" id="hijri-txt">-- رمضان 1447</span>
                <span class="date-gregorian" id="g-date">00/00/0000</span>
                <div class="city-rotation" id="city-display">ROMA: 00:00</div>
            </div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    </div>

    <!-- AYA -->
    <div class="aya-strip">
        <div class="aya-ar" id="aya-ar">إِنَّ مَعَ الْعُسْرِ يُسْرًا</div>
        <div style="font-size: 10px; color: #888; margin-top: 3px;" id="aya-it">Con la difficoltà c'è la facilità</div>
    </div>

    <!-- PRAYER LIST -->
    <div class="prayer-list" id="list-container"></div>

    <!-- FOOTER -->
    <div class="hadith-footer"><div class="hadith-track" id="h-track"></div></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Menu Strumenti</h2>
        <button class="mp-btn btn-gold" onclick="openModal('qibla-modal')">🧭 اتجاه القبلة (Qibla)</button>
        <button class="mp-btn btn-gold" onclick="openModal('tasbih-modal')">📿 المسبحة (Tasbih)</button>
        <button class="mp-btn btn-gold" onclick="openModal('tracker-modal')">✅ سجل الصلوات (Diary)</button>
        <button class="mp-btn btn-gold" onclick="openModal('names-modal')">✨ أسماء الله الحسنى (99 Nomi)</button>
        <button class="mp-btn btn-gold" onclick="openModal('duas-modal')">🤲 الأدعية (Azkar)</button>
        <button class="mp-btn btn-gold" onclick="openModal('zakat-modal')">💰 حساب الزكاة (Zakat)</button>
        <button class="mp-btn" style="background:white; color:black" onclick="window.open('https://www.google.com/maps/search/mosque+near+me')">🕌 أقرب مسجد (Mappa)</button>
        <hr style="margin:20px 0; border:0.5px solid #444;">
        <label style="font-size:12px; color:gold">🔊 Voce Athan</label>
        <select id="athan-voice" style="width:100%; padding:10px; border-radius:10px; background:#333; color:white; border:none; margin-top:5px;">
            <option value="https://www.islamcan.com/audio/adhan/azan1.mp3">Makkah</option>
            <option value="https://www.islamcan.com/audio/adhan/azan2.mp3">Madinah</option>
            <option value="https://www.islamcan.com/audio/adhan/azan3.mp3">Al-Aqsa</option>
        </select>
        <button class="mp-btn btn-gold" onclick="requestPermission()">ATTIVA NOTIFICHE</button>
        <button class="mp-btn" style="background: #ff4747; color: white;" onclick="testNotif()">PROVA TEST BANNER</button>
        <button class="mp-btn" style="background:transparent; color:white; border:1px solid white !important; margin-top:20px;" onclick="toggleMenu()">CHIUDI</button>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="qibla-modal"><div class="modal-card"><h3>Qibla</h3><div class="compass-ui"><div class="qibla-indicator">▼</div><div id="compass-disk"></div></div><button class="mp-btn btn-gold" style="margin-top:15px" onclick="closeModal('qibla-modal')">OK</button></div></div>
    <div class="modal-overlay" id="tasbih-modal"><div class="modal-card"><h3>Tasbih</h3><div id="t-display" class="tasbih-display">0</div><div class="tasbih-circle" onclick="countTasbih()">+1</div><br><small onclick="resetTasbih()" style="cursor:pointer; color:gold">Reset</small><br><button class="mp-btn" style="background:white; margin-top:10px" onclick="closeModal('tasbih-modal')">OK</button></div></div>
    <div class="modal-overlay" id="tracker-modal"><div class="modal-card"><h3>Prayer Tracker</h3><div id="tracker-list"></div><button class="mp-btn btn-gold" onclick="closeModal('tracker-modal')">OK</button></div></div>
    <div class="modal-overlay" id="names-modal"><div class="modal-card"><h3>99 Nomi di Allah</h3><div id="names-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px; text-align:right"></div><button class="mp-btn btn-gold" onclick="closeModal('names-modal')">OK</button></div></div>
    <div class="modal-overlay" id="duas-modal"><div class="modal-card"><h3>Azkar</h3><div id="duas-list" style="text-align:right"></div><button class="mp-btn btn-gold" onclick="closeModal('duas-modal')">OK</button></div></div>
    <div class="modal-overlay" id="zakat-modal"><div class="modal-card"><h3>Calcolo Zakat (2.5%)</h3><input type="number" id="z-val" class="mp-btn" style="background:white; color:black; text-align:center" placeholder="Risparmi €" oninput="document.getElementById('z-res').innerText = (this.value * 0.025).toFixed(2) + ' €'"><h2 id="z-res" style="color:gold; margin:15px 0">0.00 €</h2><button class="mp-btn btn-gold" onclick="closeModal('zakat-modal')">OK</button></div></div>

    <script>
        const timetable = {
            "18-2": {f:"05:45", dh:"12:25", a:"15:19", m:"17:46", i:"19:05", r:1}, "19-2": {f:"05:43", dh:"12:25", a:"15:20", m:"17:47", i:"19:06", r:2},
            "20-2": {f:"05:42", dh:"12:25", a:"15:21", m:"17:48", i:"19:07", r:3}, "21-2": {f:"05:41", dh:"12:25", a:"15:22", m:"17:50", i:"19:08", r:4},
            "22-2": {f:"05:39", dh:"12:24", a:"15:23", m:"17:51", i:"19:10", r:5}, "23-2": {f:"05:38", dh:"12:24", a:"15:24", m:"17:52", i:"19:11", r:6},
            "24-2": {f:"05:36", dh:"12:24", a:"15:25", m:"17:54", i:"19:12", r:7}, "25-2": {f:"05:35", dh:"12:24", a:"15:25", m:"17:55", i:"19:13", r:8},
            "26-2": {f:"05:33", dh:"12:24", a:"15:26", m:"17:56", i:"19:15", r:9}, "27-2": {f:"05:31", dh:"12:24", a:"15:27", m:"17:57", i:"19:16", r:10},
            "28-2": {f:"05:30", dh:"12:23", a:"15:28", m:"17:59", i:"19:17", r:11}, "1-3":  {f:"05:28", dh:"12:23", a:"15:29", m:"18:00", i:"19:18", r:12},
            "2-3":  {f:"05:27", dh:"12:23", a:"15:30", m:"18:01", i:"19:19", r:13}, "3-3":  {f:"05:25", dh:"12:23", a:"15:31", m:"18:02", i:"19:21", r:14},
            "4-3":  {f:"05:23", dh:"12:23", a:"15:31", m:"18:04", i:"19:22", r:15}, "5-3":  {f:"05:22", dh:"12:22", a:"15:32", m:"18:05", i:"19:23", r:16},
            "6-3":  {f:"05:20", dh:"12:22", a:"15:33", m:"18:06", i:"19:24", r:17}, "7-3":  {f:"05:18", dh:"12:22", a:"15:34", m:"18:07", i:"19:26", r:18},
            "8-3":  {f:"05:17", dh:"12:22", a:"15:35", m:"18:09", i:"19:27", r:19}, "9-3":  {f:"05:15", dh:"12:21", a:"15:35", m:"18:10", i:"19:28", r:20},
            "10-3": {f:"05:13", dh:"12:21", a:"15:36", m:"18:11", i:"19:29", r:21}, "11-3": {f:"05:11", dh:"12:21", a:"15:37", m:"18:12", i:"19:31", r:22},
            "12-3": {f:"05:09", dh:"12:21", a:"15:38", m:"18:13", i:"19:32", r:23}, "13-3": {f:"05:08", dh:"12:20", a:"15:38", m:"18:15", i:"19:33", r:24},
            "14-3": {f:"05:06", dh:"12:20", a:"15:39", m:"18:16", i:"19:34", r:25}, "15-3": {f:"05:04", dh:"12:20", a:"15:40", m:"18:17", i:"19:36", r:26},
            "16-3": {f:"05:02", dh:"12:20", a:"15:40", m:"18:18", i:"19:37", r:27}, "17-3": {f:"05:00", dh:"12:19", a:"15:41", m:"18:19", i:"19:38", r:28},
            "18-3": {f:"04:59", dh:"12:19", a:"15:42", m:"18:21", i:"19:39", r:29}, "19-3": {f:"04:57", dh:"12:19", a:"15:42", m:"18:22", i:"19:41", r:30}
        };

        const allahNames = ["الرحمن", "الرحيم", "الملك", "القدوس", "السلام", "المؤمن", "المهيمن", "العزيز", "الجبار", "المتكبر", "الخالق", "البارئ", "المصور", "الغفار", "القهار", "الوهاب", "الرزاق", "الفتاح", "العليم", "القابض", "الباسط", "الخافض", "الرافع", "المعز", "المذل", "السميع", "البصير", "الحكم", "العدل", "اللطيف", "الخبير", "الحليم", "العظيم", "الغفور", "الشكور", "العلي", "الكبير", "الحفيظ", "المقيت", "الحسيب", "الجليل", "الكريم", "الرقيب", "المجيب", "الواسع", "الحكيم", "الودود", "المجيد", "الباعث", "الشهيد", "الحق", "الوكيل", "القوي", "المتين", "الولي", "الحميد", "المحصي", "المبدئ", "المعيد", "المحيي", "المميت", "الحي", "القيوم", "الواجد", "الماجد", "الواحد", "الأحد", "الصمد", "القادر", "المقتدر", "المقدم", "المؤخر", "الأول", "الآخر", "الظاهر", "الباطن", "الوالي", "المتعالي", "البر", "التواب", "المنتقم", "العفو", "الرؤوف", "مالك الملك", "ذو الجلال والإكرام", "المقسط", "الجامع", "الغني", "المغني", "المانع", "الضار", "النافع", "النور", "الهادي", "البديع", "الباقي", "الوارث", "الرشيد", "الصبور"];
        const azkar = [{a:"أصبحنا وأصبح الملك لله", i:"Siamo giunti al mattino e il regno è di Allah"}, {a:"سبحان الله وبحمده", i:"Gloria ad Allah e lode a Lui"}, {a:"أستغفر الله", i:"Chiedo perdono ad Allah"}];
        const hadiths = ["إنما الأعمال بالنيات", "بني الإسلام على خمس", "الكلمة الطيبة صدقة"];

        let audioUnlocked = false; let lastT = ""; let tCount = 0;
        function unlockAudio() { if(!audioUnlocked) { document.getElementById('silent-audio').play(); audioUnlocked=true; }}
        async function startWakeLock() { try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){} }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function openModal(id) { document.getElementById(id).style.display='flex'; if(id==='tracker-modal') loadTracker(); toggleMenu(); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function countTasbih() { tCount++; document.getElementById('t-display').innerText=tCount; if(navigator.vibrate) navigator.vibrate(50); }
        function resetTasbih() { tCount=0; document.getElementById('t-display').innerText=0; }
        
        window.addEventListener('deviceorientationabsolute', (e) => {
            let north = e.webkitCompassHeading || 360 - e.alpha;
            document.getElementById('compass-disk').style.transform = `rotate(${- (north - 119)}deg)`;
        });

        function requestPermission() { Notification.requestPermission(); toggleMenu(); }
        function triggerBanner(title) {
            if(Notification.permission === "granted" && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({type:'SHOW_PRAYER_BANNER', title:title, body:'Bastia Umbra - È ora della preghiera'});
            }
            new Audio(document.getElementById('athan-voice').value).play();
        }

        function update() {
            const now = new Date();
            const dateKey = now.getDate() + "-" + (now.getMonth() + 1);
            const dayData = timetable[dateKey] || timetable["6-3"];
            const hhmm = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

            const cities = [{ n: "Roma", tz: "Europe/Rome" }, { n: "Rabat", tz: "Africa/Casablanca" }, { n: "Makkah", tz: "Asia/Riyadh" }];
            const cityIdx = Math.floor(now.getTime() / 30000) % 3;
            document.getElementById('city-display').innerText = `${cities[cityIdx].n.toUpperCase()}: ${now.toLocaleTimeString('it-IT', { timeZone: cities[cityIdx].tz, hour: '2-digit', minute: '2-digit' })}`;

            document.getElementById('g-date').innerText = now.toLocaleDateString('it-IT');
            document.getElementById('hijri-txt').innerText = dayData.r + " رمضان 1447";

            let html = ""; let nextP = null; let nextN = ""; let lastP = null;
            ["f","dh","a","m","i"].forEach(k => {
                const time = dayData[k];
                if (hhmm === time && now.getSeconds() === 0 && lastT !== hhmm+k) { lastT=hhmm+k; triggerBanner("صلاة "+ (k==="f"?"Fajr":k==="dh"?"Dhuhr":k==="a"?"Asr":k==="m"?"Maghrib":"Isha")); }
                const [h,m] = time.split(":"); const pDate = new Date(); pDate.setHours(h,m,0);
                if (pDate > now && !nextP) { nextP = pDate; nextN = (k==="f"?"Fajr":k==="dh"?"Dhuhr":k==="a"?"Asr":k==="m"?"Maghrib":"Isha"); }
                if (pDate <= now) lastP = pDate;
                html += `<div class="prayer-card ${hhmm === time ? 'active' : ''}"><span class="p-time">${time}</span><div class="p-right"><span class="p-name">${(k==="f"?"الفجر":k==="dh"?"الظهر":k==="a"?"العصر":k==="m"?"المغرب":"العشاء")}</span><span class="p-icon">${(k==="f"?"🌅":k==="dh"?"☀️":k==="a"?"🌤️":k==="m"?"🌇":"🌙")}</span></div></div>`;
            });

            if (!nextP) {
                const tomData = timetable[(now.getDate()+1) + "-" + (now.getMonth() + 1)] || timetable["18-2"];
                nextP = new Date(); nextP.setDate(now.getDate()+1); nextP.setHours(tomData.f.split(":")[0], tomData.f.split(":")[1], 0);
                nextN = "Fajr";
            }
            if (lastP && nextP) document.getElementById('p-bar').style.width = Math.min(((now - lastP) / (nextP - lastP)) * 100, 100) + "%";

            const diff = nextP - now;
            document.getElementById('timer-next').innerText = `${Math.floor(diff/3600000).toString().padStart(2,"0")}:${Math.floor((diff%3600000)/60000).toString().padStart(2,"0")}:${Math.floor((diff%60000)/1000).toString().padStart(2,"0")}`;
            document.getElementById('next-name').innerText = "PROSSIMA: " + nextN;
            document.getElementById('list-container').innerHTML = html;
        }

        function loadTracker() {
            const list = document.getElementById('tracker-list'); list.innerHTML = "";
            ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"].forEach(p => {
                const ck = localStorage.getItem('tr_'+p) === 'true' ? 'checked' : '';
                list.innerHTML += `<div class="tracker-item" style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px; margin-bottom:5px"><span>${p}</span><input type="checkbox" ${ck} onchange="localStorage.setItem('tr_${p}', this.checked)"></div>`;
            });
        }

        allahNames.forEach(n => document.getElementById('names-list').innerHTML += `<div style="background:rgba(255,255,255,0.1); padding:8px; border-radius:8px; border:1px solid gold">${n}</div>`);
        azkar.forEach(d => document.getElementById('duas-list').innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px; margin-bottom:8px"><b>${d.a}</b><br><small>${d.i}</small></div>`);
        document.getElementById('h-track').innerHTML = [...hadiths, ...hadiths].map(h => `<span class="hadith-text">${h}</span>`).join('');

        setInterval(update, 1000); update();
        function testNotif() { triggerBanner("Muslim Pro Test"); }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
