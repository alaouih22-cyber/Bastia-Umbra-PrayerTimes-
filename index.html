<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#004F3F">
    <title>Muslim Pro Revolution - Bastia</title>
    
    <style>
        :root {
            --mp-dark: #004F3F; --mp-gold: #C5A059; --mp-bg: #F4F6F8; --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--mp-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; color: #333;
        }

        /* HEADER */
        .header {
            width: 100%; background: linear-gradient(135deg, #004F3F 0%, #002b22 100%);
            padding: 50px 0 60px 0; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            flex-shrink: 0; z-index: 100; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .ramadan-title { color: var(--mp-gold); font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .dynamic-greeting { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 5px; }
        .menu-btn { position: absolute; left: 25px; top: 50px; color: var(--mp-gold); font-size: 32px; cursor: pointer; z-index: 101; }

        /* REVOLUTION DASHBOARD */
        .dashboard-container {
            width: 92%; margin: -40px auto 15px auto;
            z-index: 102; flex-shrink: 0;
        }

        .hero-card {
            background: var(--white); border-radius: 25px; padding: 20px;
            border: 1px solid rgba(197, 160, 89, 0.3); text-align: center;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f0f4f2; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: 800; color: var(--mp-dark); margin-bottom: 15px;
        }

        .current-prayer-display { font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; }
        .timer-main { font-size: 42px; font-weight: 900; color: var(--mp-dark); line-height: 1; margin: 10px 0; }
        .next-prayer-info { font-size: 15px; color: var(--mp-gold); font-weight: bold; }

        .progress-wrapper { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--mp-gold); transition: width 0.5s ease; }

        /* QUICK ACTIONS */
        .quick-actions {
            display: flex; justify-content: space-around; margin: 15px 0;
        }
        .action-circle {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .circle-btn {
            width: 55px; height: 55px; background: var(--white); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.9); background: var(--mp-gold); color: white; }
        .action-circle span { font-size: 10px; font-weight: bold; color: #666; }

        /* AYA & PRAYER LIST */
        .aya-card { width: 92%; margin: 0 auto 12px auto; background: #fff8eb; border-radius: 15px; padding: 12px; border-right: 4px solid var(--mp-gold); text-align: center; font-size: 13px; }
        
        .prayer-list { width: 92%; margin: 0 auto; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 16px 20px; border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid transparent;
        }
        .prayer-card.active { border: 1.5px solid var(--mp-gold); background: #fffcf5; transform: scale(1.02); }
        .p-right { display: flex; align-items: center; gap: 15px; }
        .p-name { font-size: 17px; font-weight: 800; color: var(--mp-dark); }
        .p-icon { font-size: 22px; }
        .p-time { font-size: 18px; font-weight: 900; color: #222; }

        /* SIDEBAR & MODALS */
        .sidebar { position: fixed; top: 0; left: -310px; width: 310px; height: 100%; background: var(--mp-dark); z-index: 2000; transition: 0.4s; padding: 40px 20px; color: white; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .mp-btn { width: 100%; padding: 14px; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; border: none; }
        .btn-gold { background: var(--mp-gold); color: var(--mp-dark); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .modal-card { background: var(--mp-dark); width: 90%; padding: 30px; border-radius: 25px; border: 2px solid var(--mp-gold); text-align: center; max-height: 80vh; overflow-y: auto; }

        /* TOOLS UI */
        .compass-ui { width: 180px; height: 180px; margin: 0 auto; border: 3px solid gold; border-radius: 50%; position: relative; background: #002b22; }
        #compass-disk { width: 100%; height: 100%; background: url('icon.png') center/cover; border-radius: 50%; transition: transform 0.1s; }
        .qibla-indicator { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); color: red; font-size: 30px; z-index: 10; }

        /* HADITH FOOTER */
        .hadith-footer { width: 100%; background: var(--mp-dark); padding: 12px 0; border-top: 2px solid var(--mp-gold); overflow: hidden; flex-shrink: 0; direction: ltr !important; }
        .hadith-track { display: flex; width: max-content; animation: marquee-rtl 250s linear infinite; }
        .hadith-text { color: var(--mp-gold); font-weight: 600; font-size: 14px; padding: 0 50px; direction: rtl; white-space: nowrap; }
        @keyframes marquee-rtl { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body onclick="unlockAudio(); startWakeLock();">

    <audio id="silent-audio" loop><source src="https://github.com/anars/blank-audio/raw/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="header">
        <h1 class="ramadan-title">Muslim Pro Bastia</h1>
        <span class="dynamic-greeting" id="greeting">Salam alaykum</span>
    </div>

    <!-- REVOLUTION DASHBOARD -->
    <div class="dashboard-container">
        <div class="hero-card">
            <div class="status-pill">
                <span id="moon-icon">🌙</span>
                <span id="hijri-txt">-- رمضان 1447</span>
                <span style="opacity: 0.4;">|</span>
                <span id="g-date">--/--/----</span>
            </div>
            
            <div class="current-prayer-display" id="city-display">ROMA: 00:00</div>
            <div class="timer-main" id="timer-next">00:00:00</div>
            <div class="next-prayer-info" id="next-name">In attesa...</div>

            <div class="progress-wrapper">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>

        <!-- QUICK ACTIONS BUBBLES -->
        <div class="quick-actions">
            <div class="action-circle" onclick="openModal('qibla-modal')">
                <div class="circle-btn">🧭</div>
                <span>Qibla</span>
            </div>
            <div class="action-circle" onclick="openModal('tasbih-modal')">
                <div class="circle-btn">📿</div>
                <span>Tasbih</span>
            </div>
            <div class="action-circle" onclick="openModal('tracker-modal')">
                <div class="circle-btn">✅</div>
                <span>Diary</span>
            </div>
            <div class="action-circle" onclick="window.open('https://www.google.com/maps/search/mosque+near+me')">
                <div class="circle-btn">🕌</div>
                <span>Mappa</span>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Impostazioni & Strumenti</h2>
        <button class="mp-btn btn-gold" onclick="openModal('names-modal')">✨ أسماء الله الحسنى (99 Nomi)</button>
        <button class="mp-btn btn-gold" onclick="openModal('duas-modal')">🤲 الأدعية (Azkar/Duas)</button>
        <button class="mp-btn btn-gold" onclick="openModal('zakat-modal')">💰 حساب الزكاة (Zakat)</button>
        
        <hr style="margin:20px 0; border:0.5px solid #555;">
        
        <label style="font-size:12px; color:var(--mp-gold)">🔊 Voce Athan</label>
        <select id="athan-voice" class="mp-select" style="width:100%; padding:10px; background:#333; color:white; border-radius:10px; margin-top:5px;">
            <option value="https://www.islamcan.com/audio/adhan/azan1.mp3">Makkah</option>
            <option value="https://www.islamcan.com/audio/adhan/azan2.mp3">Madinah</option>
            <option value="https://www.islamcan.com/audio/adhan/azan3.mp3">Al-Aqsa</option>
        </select>
        
        <button class="mp-btn btn-gold" style="margin-top:20px" onclick="requestPermission()">ATTIVA NOTIFICHE</button>
        <button class="mp-btn" style="background: #ff4747; color: white;" onclick="testNotif()">PROVA TEST BANNER</button>
        <button class="mp-btn" style="background:transparent; color:white; border:1px solid white !important" onclick="toggleMenu()">CHIUDI</button>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="qibla-modal"><div class="modal-card"><h3>Qibla</h3><div class="compass-ui"><div class="qibla-indicator">▼</div><div id="compass-disk"></div></div><button class="mp-btn btn-gold" style="margin-top:15px" onclick="closeModal('qibla-modal')">OK</button></div></div>
    <div class="modal-overlay" id="tasbih-modal"><div class="modal-card"><h3>Tasbih</h3><div id="t-display" style="font-size:60px; margin:20px 0">0</div><button class="mp-btn btn-gold" style="height:100px; width:100px; border-radius:50%; margin:0 auto" onclick="countTasbih()">+1</button><br><small onclick="resetTasbih()" style="cursor:pointer; color:gold">Reset</small><br><button class="mp-btn" style="background:white" onclick="closeModal('tasbih-modal')">OK</button></div></div>
    <div class="modal-overlay" id="tracker-modal"><div class="modal-card"><h3>Prayer Tracker</h3><div id="tracker-list"></div><button class="mp-btn btn-gold" onclick="closeModal('tracker-modal')">OK</button></div></div>
    <div class="modal-overlay" id="zakat-modal"><div class="modal-card"><h3>Zakat Calcolatore</h3><input type="number" id="z-val" class="mp-select" style="text-align:center; font-size:20px" oninput="calcZakat()"><h2 id="z-res" style="color:gold; margin:15px 0">0.00 €</h2><button class="mp-btn btn-gold" onclick="closeModal('zakat-modal')">OK</button></div></div>
    <div class="modal-overlay" id="names-modal"><div class="modal-card"><h3>99 Nomi di Allah</h3><div id="names-list" class="names-grid" style="grid-template-columns: 1fr 1fr; font-size:12px;"></div><button class="mp-btn btn-gold" onclick="closeModal('names-modal')">CHIUDI</button></div></div>
    <div class="modal-overlay" id="duas-modal"><div class="modal-card"><h3>Azkar</h3><div id="duas-list"></div><button class="mp-btn btn-gold" onclick="closeModal('duas-modal')">CHIUDI</button></div></div>

    <!-- AYA DEL GIORNO -->
    <div class="aya-card">
        <span class="aya-ar" id="aya-ar">...</span>
        <span class="aya-it" id="aya-it">...</span>
    </div>

    <div class="prayer-list" id="list-container"></div>
    <div class="hadith-footer"><div class="hadith-track" id="h-track"></div></div>

    <script>
        const timetable = {
            "18-2": {f:"05:45", dh:"12:25", a:"15:19", m:"17:46", i:"19:05", r:1}, "19-2": {f:"05:43", dh:"12:25", a:"15:20", m:"17:47", i:"19:06", r:2},
            "20-2": {f:"05:42", dh:"12:25", a:"15:21", m:"17:48", i:"19:07", r:3}, "21-2": {f:"05:41", dh:"12:25", a:"15:22", m:"17:50", i:"19:08", r:4},
            "22-2": {f:"05:39", dh:"12:24", a:"15:23", m:"17:51", i:"19:10", r:5}, "23-2": {f:"05:38", dh:"12:24", a:"15:24", m:"17:52", i:"19:11", r:6},
            "24-2": {f:"05:36", dh:"12:24", a:"15:25", m:"17:54", i:"19:12", r:7}, "25-2": {f:"05:35", dh:"12:24", a:"15:25", m:"17:55", i:"19:13", r:8},
            "26-2": {f:"05:33", dh:"12:24", a:"15:26", m:"17:56", i:"19:15", r:9}, "27-2": {f:"05:31", dh:"12:24", a:"15:27", m:"17:57", i:"19:16", r:10},
            "28-2": {f:"05:30", dh:"12:23", a:"15:28", m:"17:59", i:"19:17", r:11}, "1-3":  {f:"05:28", dh:"12:23", a:"15:29", m:"18:00", i:"19:18", r:12},
            "2-3":  {f:"05:27", dh:"12:23", a:"15:30", m:"18:01", i:"19:19", r:13}, "3-3":  {f:"05:25", dh:"12:23", a:"15:31", m:"18:02", i:"19:21", r:14},
            "4-3":  {f:"05:23", dh:"12:23", a:"15:31", m:"18:04", i:"19:22", r:15}, "5-3":  {f:"05:22", dh:"12:22", a:"15:32", m:"18:05", i:"19:23", r:16},
            "6-3":  {f:"05:20", dh:"12:22", a:"15:33", m:"18:06", i:"19:24", r:17}, "7-3":  {f:"05:18", dh:"12:22", a:"15:34", m:"18:07", i:"19:26", r:18},
            "8-3":  {f:"05:17", dh:"12:22", a:"15:35", m:"18:09", i:"19:27", r:19}, "9-3":  {f:"05:15", dh:"12:21", a:"15:35", m:"18:10", i:"19:28", r:20},
            "10-3": {f:"05:13", dh:"12:21", a:"15:36", m:"18:11", i:"19:29", r:21}, "11-3": {f:"05:11", dh:"12:21", a:"15:37", m:"18:12", i:"19:31", r:22},
            "12-3": {f:"05:09", dh:"12:21", a:"15:38", m:"18:13", i:"19:32", r:23}, "13-3": {f:"05:08", dh:"12:20", a:"15:38", m:"18:15", i:"19:33", r:24},
            "14-3": {f:"05:06", dh:"12:20", a:"15:39", m:"18:16", i:"19:34", r:25}, "15-3": {f:"05:04", dh:"12:20", a:"15:40", m:"18:17", i:"19:36", r:26},
            "16-3": {f:"05:02", dh:"12:20", a:"15:40", m:"18:18", i:"19:37", r:27}, "17-3": {f:"05:00", dh:"12:19", a:"15:41", m:"18:19", i:"19:38", r:28},
            "18-3": {f:"04:59", dh:"12:19", a:"15:42", m:"18:21", i:"19:39", r:29}, "19-3": {f:"04:57", dh:"12:19", a:"15:42", m:"18:22", i:"19:41", r:30}
        };

        const hadithFull = [{ar:"إنما الأعمال بالنيات", it:"Le azioni dipendono dalle intenzioni"}, {ar:"بني الإسلام على خمس", it:"L'Islam si basa su 5 pilastri"}, {ar:"الكلمة الطيبة صدقة", it:"La parola buona è carità"}];
        const allahNames = [{a:"الرحمن", i:"Misericordioso"}, {a:"الرحيم", i:"Compassionevole"}, {a:"الملك", i:"Sovrano"}, {a:"القدوس", i:"Santo"}];
        const ayas = [{a:"إِنَّ مَعَ الْعُسْرِ يُسْرًا", i:"Con la difficoltà c'è la facilità."}, {a:"اللَّهُ نُورُ السَّمَاوَاتِ", i:"Allah è luce dei cieli."}];
        const azkar = [{a:"سبحان الله", i:"Gloria ad Allah"}, {a:"الحمد لله", i:"Lode ad Allah"}];

        let audioUnlocked = false; let lastT = ""; let tCount = 0;

        function unlockAudio() { if(!audioUnlocked) { document.getElementById('silent-audio').play(); audioUnlocked=true; }}
        async function startWakeLock() { try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){} }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function openModal(id) { document.getElementById(id).style.display='flex'; if(id==='tracker-modal') loadTracker(); toggleMenu(); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        
        function countTasbih() { tCount++; document.getElementById('t-display').innerText=tCount; if(navigator.vibrate) navigator.vibrate(50); }
        function resetTasbih() { tCount=0; document.getElementById('t-display').innerText=0; }
        function calcZakat() { document.getElementById('z-res').innerText = (document.getElementById('z-val').value * 0.025).toFixed(2) + " €"; }
        
        function loadTracker() {
            const pr = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
            const list = document.getElementById('tracker-list'); list.innerHTML = "";
            pr.forEach(p => {
                const ck = localStorage.getItem('tr_'+p) === 'true' ? 'checked' : '';
                list.innerHTML += `<div class="tracker-item"><span>${p}</span><input type="checkbox" ${ck} onchange="localStorage.setItem('tr_${p}', this.checked)"></div>`;
            });
        }

        window.addEventListener('deviceorientationabsolute', (e) => {
            let north = e.webkitCompassHeading || 360 - e.alpha;
            document.getElementById('compass-disk').style.transform = `rotate(${- (north - 119)}deg)`;
        });

        function requestPermission() { Notification.requestPermission(); toggleMenu(); }
        
        function triggerBanner(title) {
            if(Notification.permission === "granted" && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({type:'SHOW_PRAYER_BANNER', title:title, body:'È ora della preghiera a Bastia Umbra'});
            }
            new Audio(document.getElementById('athan-voice').value).play();
        }

        function update() {
            const now = new Date();
            const dateKey = now.getDate() + "-" + (now.getMonth() + 1);
            const dayData = timetable[dateKey] || timetable["6-3"];
            const hhmm = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

            // GREETING
            const hrs = now.getHours();
            document.getElementById('greeting').innerText = hrs < 12 ? "Sabah al Khair (Buongiorno)" : hrs < 18 ? "Ramadan Kareem" : "Masaa al Khair (Buonasera)";

            // CITY ROTATION
            const cities = [{ n: "Roma", tz: "Europe/Rome" }, { n: "Rabat", tz: "Africa/Casablanca" }, { n: "Makkah", tz: "Asia/Riyadh" }];
            const cityIdx = Math.floor(now.getTime() / 30000) % 3;
            document.getElementById('city-display').innerText = `${cities[cityIdx].n.toUpperCase()}: ${now.toLocaleTimeString('it-IT', { timeZone: cities[cityIdx].tz, hour: '2-digit', minute: '2-digit' })}`;

            document.getElementById('g-date').innerText = now.toLocaleDateString('it-IT');
            document.getElementById('hijri-txt').innerText = dayData.r + " رمضان 1447";
            document.getElementById('moon-icon').innerText = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"][Math.floor((dayData.r/30)*8)%8];

            const ayaIdx = now.getDate() % ayas.length;
            document.getElementById('aya-ar').innerText = ayas[ayaIdx].a;
            document.getElementById('aya-it').innerText = ayas[ayaIdx].i;

            let html = ""; let nextP = null; let nextN = ""; let lastP = null;
            ["f","dh","a","m","i"].forEach(k => {
                const time = dayData[k];
                if (hhmm === time && now.getSeconds() === 0 && lastT !== hhmm+k) { lastT=hhmm+k; triggerBanner("صلاة "+ (k==="f"?"الفجر":k==="dh"?"الظهر":k==="a"?"العصر":k==="m"?"المغرب":"العشاء")); }
                const [h,m] = time.split(":"); const pDate = new Date(); pDate.setHours(h,m,0);
                if (pDate > now && !nextP) { nextP = pDate; nextN = (k==="f"?"الفajr":k==="dh"?"Dhuhr":k==="a"?"Asr":k==="m"?"Maghrib":"Isha"); }
                if (pDate <= now) lastP = pDate;
                html += `<div class="prayer-card ${hhmm === time ? 'active' : ''}"><span class="p-time">${time}</span><div class="p-right"><span class="p-name">${(k==="f"?"الفجر":k==="dh"?"الظهر":k==="a"?"العصر":k==="m"?"المغرب":"العشاء")}</span><span class="p-icon">${(k==="f"?"🌅":k==="dh"?"☀️":k==="a"?"🌤️":k==="m"?"🌇":"🌙")}</span></div></div>`;
            });

            if (!nextP) {
                const tomData = timetable[(now.getDate()+1) + "-" + (now.getMonth() + 1)] || timetable["18-2"];
                nextP = new Date(); nextP.setDate(now.getDate()+1); nextP.setHours(tomData.f.split(":")[0], tomData.f.split(":")[1], 0);
                nextN = "Fajr";
            }
            if (lastP && nextP) document.getElementById('p-bar').style.width = Math.min(((now - lastP) / (nextP - lastP)) * 100, 100) + "%";

            const diff = nextP - now;
            document.getElementById('timer-next').innerText = `${Math.floor(diff/3600000).toString().padStart(2,"0")}:${Math.floor((diff%3600000)/60000).toString().padStart(2,"0")}:${Math.floor((diff%60000)/1000).toString().padStart(2,"0")}`;
            document.getElementById('next-name').innerText = "Prossima: " + nextN;
            document.getElementById('list-container').innerHTML = html;
        }

        allahNames.forEach(n => document.getElementById('names-list').innerHTML += `<div class="name-box"><b>${n.a}</b><br><small>${n.i}</small></div>`);
        azkar.forEach(d => document.getElementById('duas-list').innerHTML += `<div class="tracker-item"><b>${d.a}</b><br><small>${d.i}</small></div>`);
        document.getElementById('h-track').innerHTML = [...hadithFull, ...hadithFull].map(h => `<span class="hadith-text">${h.ar} <span style="font-size:11px">[${h.it}]</span></span>`).join('');

        setInterval(update, 1000); update();
        function testNotif() { triggerBanner("Muslim Pro Test"); }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
