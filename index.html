<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#004F3F">
    <title>Muslim Pro Elite - Bastia</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --mp-dark: #004F3F; --mp-gold: #C5A059; --mp-bg: #F8F9FA; --white: #ffffff;
            --accent: #E9ECEF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--mp-bg);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; color: #1a1a1a;
        }

        /* HEADER ANIMATO */
        .header {
            width: 100%; background: var(--mp-dark);
            padding: 50px 20px 25px 20px; 
            border-bottom: 4px solid var(--mp-gold);
            flex-shrink: 0; z-index: 1000; position: relative;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn { color: var(--mp-gold); font-size: 35px; cursor: pointer; order: 1; }
        .ramadan-title { 
            font-family: 'Amiri', serif; color: var(--mp-gold); font-size: 26px; font-weight: 900;
            background: linear-gradient(to right, #C5A059 20%, #FFF 50%, #C5A059 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite; order: 2;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        .header-logo { width: 55px; height: 55px; border-radius: 12px; background: url('icon.png') center/cover; border: 2px solid var(--mp-gold); order: 3; }

        /* DASHBOARD SUPREME */
        .dashboard {
            width: 92%; margin: 15px auto;
            background: var(--white); border-radius: 28px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            flex-shrink: 0; border: 1px solid rgba(0,0,0,0.02);
        }
        .dash-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .timer-main { font-size: 38px; font-weight: 900; color: var(--mp-dark); letter-spacing: -1px; }
        .date-box { text-align: left; line-height: 1.2; }
        .date-hijri { font-size: 16px; font-weight: 800; color: var(--mp-dark); }
        .city-label { font-size: 11px; font-weight: 800; color: var(--mp-gold); text-transform: uppercase; }

        /* BOLLE AZIONI (GRANDI) */
        .action-bubbles { display: flex; justify-content: space-between; gap: 5px; margin: 10px 0; }
        .bubble-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .bubble-circle { width: 54px; height: 54px; background: #f8fcfb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1.5px solid var(--mp-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .bubble-circle:active { transform: scale(0.9); background: var(--mp-gold); }
        .bubble-label { font-size: 9px; font-weight: 900; color: var(--mp-dark); text-transform: uppercase; }

        /* LISTA PREGHIERE */
        .prayer-list { width: 92%; margin: 0 auto; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 18px 22px; border-radius: 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .prayer-card.active { border: 2px solid var(--mp-gold); background: #FFFCF5; transform: scale(1.02); }
        .p-name { font-size: 19px; font-weight: 700; color: var(--mp-dark); }
        .p-time { font-size: 22px; font-weight: 900; }

        /* SIDEBAR (SINISTRA) */
        .sidebar { position: fixed; top: 0; left: -320px; width: 310px; height: 100%; background: var(--mp-dark); z-index: 2000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 50px 20px; color: white; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar h2 { color: var(--mp-gold); text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        /* PULSANTI NOTIFICHE MODERNI */
        .notif-pill { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-modern { width: 100%; padding: 16px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-activate { background: var(--white); color: var(--mp-dark); }
        .btn-test { background: #ff4747; color: white; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--mp-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 35px; border: 2px solid var(--mp-gold); text-align: center; max-height: 85vh; overflow-y: auto; color: #333; }
        .light-item { background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #eee; text-align: right; }

        /* HADITH FOOTER */
        .hadith-footer { width: 100%; background: var(--mp-dark); padding: 12px 0; border-top: 2px solid var(--mp-gold); overflow: hidden; flex-shrink: 0; direction: ltr !important; }
        .hadith-track { display: flex; width: max-content; animation: marquee-rtl 140s linear infinite; }
        .hadith-text { color: var(--mp-gold); font-weight: 600; font-size: 14px; padding: 0 60px; direction: rtl; white-space: nowrap; }
        @keyframes marquee-rtl { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body onclick="unlockAudio(); startWakeLock();">

    <audio id="silent-audio" loop><source src="https://github.com/anars/blank-audio/raw/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

    <div class="header">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="ramadan-title">رمضان مبارك 🏮</div>
        <div class="header-logo"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <div class="dash-info">
            <div style="text-align:right">
                <div class="timer-main" id="timer-next">00:00:00</div>
                <div style="font-size:11px; font-weight:800; color:var(--mp-gold)" id="next-name">PROSSIMA PREGHIERA</div>
            </div>
            <div class="date-box">
                <div class="date-hijri" id="hijri-txt">-- رمضان 1447</div>
                <div class="city-label" id="city-display">ROMA: 00:00</div>
                <div style="font-size:10px; opacity:0.5" id="g-date">06/03/2026</div>
            </div>
        </div>

        <div class="action-bubbles">
            <div class="bubble-item" onclick="openModal('tracker-modal')"><div class="bubble-circle">✅</div><span class="bubble-label">Diary</span></div>
            <div class="bubble-item" onclick="openModal('duas-modal')"><div class="bubble-circle">🤲</div><span class="bubble-label">Azkar</span></div>
            <div class="bubble-item" onclick="openModal('names-modal')"><div class="bubble-circle">✨</div><span class="bubble-label">Nomi 99</span></div>
            <div class="bubble-item" onclick="openModal('tasbih-modal')"><div class="bubble-circle">📿</div><span class="bubble-label">Tasbih</span></div>
            <div class="bubble-item" onclick="openModal('qibla-modal')"><div class="bubble-circle">🧭</div><span class="bubble-label">Qibla</span></div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    </div>

    <div class="prayer-list" id="list-container"></div>
    <div class="hadith-footer"><div class="hadith-track" id="h-track"></div></div>

    <!-- SIDEBAR (SINISTRA) -->
    <div class="sidebar" id="sidebar">
        <h2>Impostazioni App</h2>
        
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px;">
            <label style="font-size:12px; color:var(--mp-gold)">🔊 Scegli Suono Athan</label>
            <select id="athan-voice" style="width:100%; padding:12px; background:#222; color:white; border-radius:10px; border:1px solid gold; margin-top:8px;">
                <option value="https://www.islamcan.com/audio/adhan/azan1.mp3">Makkah</option>
                <option value="https://www.islamcan.com/audio/adhan/azan2.mp3">Madinah</option>
            </select>
        </div>

        <div class="sidebar-item" onclick="openModal('zakat-modal')" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; cursor:pointer;">💰 Calcola Zakat</div>

        <div class="notif-pill">
            <button class="btn-modern btn-activate" onclick="requestPermission()">Attiva Notifiche Banner</button>
            <button class="btn-modern btn-test" onclick="testNotif()">Prova Banner (Test)</button>
        </div>
        
        <button class="mp-btn" style="background:transparent; border:1px solid white !important; color:white; margin-top:30px;" onclick="toggleMenu()">CHIUDI MENU</button>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="qibla-modal"><div class="modal-card"><h3>Qibla</h3><div style="width:200px; height:200px; border:2px solid gold; border-radius:50%; margin:0 auto; position:relative;"><div id="compass-disk" style="width:100%; height:100%; background:url('icon.png') center/cover; border-radius:50%;"></div></div><button class="mp-btn btn-gold" style="margin-top:20px" onclick="closeModal('qibla-modal')">OK</button></div></div>
    <div class="modal-overlay" id="tasbih-modal"><div class="modal-card"><h3>Tasbih</h3><div id="t-display" style="font-size:70px; margin:20px 0">0</div><div style="width:120px; height:120px; border-radius:50%; background:gold; color:darkgreen; display:flex; align-items:center; justify-content:center; margin:0 auto; font-size:30px; font-weight:900" onclick="countTasbih()">+1</div><br><small onclick="resetTasbih()" style="cursor:pointer">Reset</small><br><button class="mp-btn" style="background:white" onclick="closeModal('tasbih-modal')">CHIUDI</button></div></div>
    <div class="modal-overlay" id="tracker-modal"><div class="modal-card"><h3>Prayer Diary</h3><div id="tracker-list"></div><button class="mp-btn btn-gold" onclick="closeModal('tracker-modal')">OK</button></div></div>
    <div class="modal-overlay" id="names-modal"><div class="modal-card"><h3>99 Nomi di Allah</h3><div id="names-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px; text-align:right"></div><button class="mp-btn btn-gold" onclick="closeModal('names-modal')">CHIUDI</button></div></div>
    <div class="modal-overlay" id="duas-modal"><div class="modal-card"><h3>Azkar</h3><div id="duas-list" style="text-align:right"></div><button class="mp-btn btn-gold" onclick="closeModal('duas-modal')">CHIUDI</button></div></div>
    <div class="modal-overlay" id="zakat-modal"><div class="modal-card"><h3>Calcolo Zakat</h3><input type="number" id="z-val" class="mp-btn" style="background:#eee; color:black; text-align:center" placeholder="Risparmi €" oninput="document.getElementById('z-res').innerText = (this.value * 0.025).toFixed(2) + ' €'"><h2 id="z-res" style="color:gold; margin:15px 0">0.00 €</h2><button class="mp-btn btn-gold" onclick="closeModal('zakat-modal')">OK</button></div></div>

    <script>
        const timetable = {
            "6-3": {f:"05:20", dh:"12:22", a:"15:33", m:"18:06", i:"19:24", r:17},
            "7-3": {f:"05:18", dh:"12:22", a:"15:34", m:"18:07", i:"19:26", r:18},
            "8-3": {f:"05:17", dh:"12:22", a:"15:34", m:"18:09", i:"19:27", r:19},
            "9-3": {f:"05:15", dh:"12:21", a:"15:35", m:"18:10", i:"19:28", r:20},
            "10-3":{f:"05:13", dh:"12:21", a:"15:36", m:"18:11", i:"19:29", r:21},
            "11-3":{f:"05:11", dh:"12:21", a:"15:37", m:"18:12", i:"19:31", r:22},
            "12-3":{f:"05:09", dh:"12:21", a:"15:38", m:"18:13", i:"19:32", r:23},
            "13-3":{f:"05:08", dh:"12:20", a:"15:38", m:"18:15", i:"19:33", r:24},
            "14-3":{f:"05:06", dh:"12:20", a:"15:39", m:"18:16", i:"19:34", r:25},
            "15-3":{f:"05:04", dh:"12:20", a:"15:40", m:"18:17", i:"19:36", r:26},
            "16-3":{f:"05:02", dh:"12:20", a:"15:40", m:"18:18", i:"19:37", r:27},
            "17-3":{f:"05:00", dh:"12:19", a:"15:41", m:"18:19", i:"19:38", r:28},
            "18-3":{f:"04:59", dh:"12:19", a:"15:42", m:"18:21", i:"19:39", r:29},
            "19-3":{f:"04:57", dh:"12:19", a:"15:42", m:"18:22", i:"19:41", r:30}
        };

        const pNames = { f:"الفجر", dh:"الظهر", a:"العصر", m:"المغرب", i:"العشاء" };
        const pNamesIT = { f:"Fajr", dh:"Dhuhr", a:"Asr", m:"Maghrib", i:"Isha" };
        const pIcons = { f:"🌅", dh:"☀️", a:"🌤️", m:"🌇", i:"🌙" };
        const hadithFull = [{ar:"إنما الأعمال بالنيات", it:"Le azioni dipendono dalle intenzioni"}, {ar:"بني الإسلام على خمس", it:"L'Islam si basa su 5 pilastri"}, {ar:"الكلمة الطيبة صدقة", it:"La parola buona è carità"}];
        const allahNames = ["الرحمن", "الرحيم", "الملك", "القدوس", "السلام", "المؤمن", "المهيمن", "العزيز", "الجبار", "المتكبر"];
        const azkar = [{a:"سبحان الله وبحمده", i:"Gloria ad Allah"}, {a:"أستغفر الله", i:"Chiedo perdono ad Allah"}];

        let audioUnlocked = false; let lastT = ""; let tCount = 0;
        function unlockAudio() { if(!audioUnlocked) { document.getElementById('silent-audio').play().catch(e=>{}); audioUnlocked=true; }}
        async function startWakeLock() { try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){} }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function openModal(id) { document.getElementById(id).style.display='flex'; if(id==='tracker-modal') loadTracker(); toggleMenu(); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function countTasbih() { tCount++; document.getElementById('t-display').innerText=tCount; if(navigator.vibrate) navigator.vibrate(50); }
        function resetTasbih() { tCount=0; document.getElementById('t-display').innerText=0; }
        
        window.addEventListener('deviceorientationabsolute', (e) => {
            let north = e.webkitCompassHeading || 360 - e.alpha;
            document.getElementById('compass-disk').style.transform = `rotate(${- (north - 119)}deg)`;
        });

        function requestPermission() { Notification.requestPermission(); toggleMenu(); }
        function triggerBanner(title) {
            if(Notification.permission === "granted" && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({type:'SHOW_PRAYER_BANNER', title:title, body:'Bastia Umbra - È ora della preghiera'});
            }
            new Audio(document.getElementById('athan-voice').value).play();
        }
        function testNotif() { triggerBanner("تجربة Muslim Pro"); }

        function update() {
            const now = new Date();
            const dateKey = now.getDate() + "-" + (now.getMonth() + 1);
            const dayData = timetable[dateKey] || timetable["6-3"];
            const hhmm = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

            const cities = [{ n: "Roma", tz: "Europe/Rome" }, { n: "Rabat", tz: "Africa/Casablanca" }, { n: "Makkah", tz: "Asia/Riyadh" }];
            const cityIdx = Math.floor(now.getTime() / 30000) % 3;
            document.getElementById('city-display').innerText = `${cities[cityIdx].n.toUpperCase()}: ${now.toLocaleTimeString('it-IT', { timeZone: cities[cityIdx].tz, hour: '2-digit', minute: '2-digit' })}`;

            document.getElementById('hijri-txt').innerText = dayData.r + " رمضان 1447";

            let html = ""; let nextP = null; let nextN = ""; let lastP = null;
            ["f","dh","a","m","i"].forEach(k => {
                const time = dayData[k];
                if (hhmm === time && now.getSeconds() === 0 && lastT !== hhmm+k) { lastT=hhmm+k; triggerBanner("صلاة "+pNames[k]); }
                const [h,m] = time.split(":"); const pDate = new Date(); pDate.setHours(h,m,0);
                if (pDate > now && !nextP) { nextP = pDate; nextN = pNamesIT[k]; }
                if (pDate <= now) lastP = pDate;
                html += `<div class="prayer-card ${hhmm === time ? 'active' : ''}"><span class="p-time">${time}</span><div class="p-right"><span class="p-name">${pNames[k]}</span><span class="p-icon">${pIcons[k]}</span></div></div>`;
            });

            if (!nextP) {
                const tomData = timetable[(now.getDate()+1) + "-" + (now.getMonth() + 1)] || timetable["6-3"];
                nextP = new Date(); nextP.setDate(now.getDate()+1); nextP.setHours(tomData.f.split(":")[0], tomData.f.split(":")[1], 0);
                nextN = "Fajr";
            }
            if (lastP && nextP) document.getElementById('p-bar').style.width = Math.min(((now - lastP) / (nextP - lastP)) * 100, 100) + "%";

            const diff = nextP - now;
            document.getElementById('timer-next').innerText = `${Math.floor(diff/3600000).toString().padStart(2,"0")}:${Math.floor((diff%3600000)/60000).toString().padStart(2,"0")}:${Math.floor((diff%60000)/1000).toString().padStart(2,"0")}`;
            document.getElementById('next-name').innerText = "PROSSIMA: " + nextN;
            document.getElementById('list-container').innerHTML = html;
        }

        function loadTracker() {
            const list = document.getElementById('tracker-list'); list.innerHTML = "";
            ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"].forEach(p => {
                const ck = localStorage.getItem('tr_'+p) === 'true' ? 'checked' : '';
                list.innerHTML += `<div class="light-item" style="display:flex; justify-content:space-between"><span>${p}</span><input type="checkbox" ${ck} onchange="localStorage.setItem('tr_${p}', this.checked)"></div>`;
            });
        }

        allahNames.forEach(n => document.getElementById('names-list').innerHTML += `<div class="light-item" style="text-align:center; padding:10px;"><b>${n}</b></div>`);
        azkar.forEach(d => document.getElementById('duas-list').innerHTML += `<div class="light-item"><b>${d.a}</b><br><small>${d.i}</small></div>`);
        document.getElementById('h-track').innerHTML = [...hadithFull, ...hadithFull].map(h => `<span class="hadith-text">${h.ar} <span style="font-size:11px">[${h.it}]</span></span>`).join('');

        setInterval(update, 1000); update();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
