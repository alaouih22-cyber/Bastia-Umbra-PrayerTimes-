<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004F3F">
    <title>Muslim Pro - Bastia Umbra</title>
    <style>
        :root { --mp-dark: #004F3F; --mp-gold: #C5A059; --mp-bg: #F5F7F9; }
        
        /* Reset totale per eliminare la striscia verde a sinistra */
        * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; outline: none !important; }
        
        body { background-color: var(--mp-bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        /* Header */
        .header {
            width: 100%; background: var(--mp-dark); padding: 40px 0; text-align: center;
            border-bottom: 4px solid var(--mp-gold) !important; position: relative; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
        .ramadan-title { color: var(--mp-gold); font-size: 34px; font-weight: 900; }
        .menu-btn { position: absolute; left: 20px; top: 25px; color: var(--mp-gold); font-size: 35px; cursor: pointer; z-index: 100; }

        /* Dashboard - Qui le informazioni devono essere visibili */
        .dashboard { width: 92%; max-width: 500px; margin: -25px 0 15px 0; display: flex; gap: 12px; z-index: 10; flex-shrink: 0; }
        .dash-card {
            flex: 1; background: white; border-radius: 20px; padding: 15px;
            border: 1.5px solid var(--mp-gold) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1) !important;
            text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .timer-main { font-size: 26px; font-weight: 900; color: var(--mp-dark); display: block; }
        .date-hijri { font-size: 15px; font-weight: 900; color: var(--mp-dark); margin-top: 5px; }
        .label-small { font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }

        /* Lista Preghiere - Icone a Destra */
        .prayer-list { width: 94%; flex-grow: 1; overflow-y: auto; padding: 10px 5px; display: flex; flex-direction: column; gap: 10px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 20px 25px; border-radius: 22px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
        }
        .prayer-card.active { border: 2.5px solid var(--mp-gold) !important; background: #fffcf5 !important; }
        .p-right { display: flex; align-items: center; gap: 15px; }
        .p-name { font-size: 24px; font-weight: 800; color: var(--mp-dark); }
        .p-icon { font-size: 30px; }
        .p-time { font-size: 25px; font-weight: 900; color: #333; }

        /* Hadith Footer */
        .hadith-footer { width: 100%; background: var(--mp-dark); padding: 12px 0; border-top: 3px solid var(--mp-gold) !important; overflow: hidden; flex-shrink: 0; }
        .hadith-track { display: flex; width: max-content; animation: scroll-hadith 300s linear infinite; }
        .hadith-text { color: var(--mp-gold); font-weight: 600; font-size: 15px; white-space: nowrap; padding-left: 60px; }
        @keyframes scroll-hadith { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: var(--mp-dark); z-index: 2000; transition: 0.4s; padding: 40px 20px; color: white; }
        .sidebar.open { left: 0; }
        .mp-btn { width: 100%; padding: 12px; border-radius: 10px; margin-top: 20px; font-weight: bold; cursor: pointer; border: none !important; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="header">
        <h1 class="ramadan-title">رمضان مبارك</h1>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--mp-gold)">إعدادات المسلم</h2>
        <div style="margin-top:20px">
            <label>🔔 نوع التنبيه</label>
            <select id="notif-type" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; background:rgba(255,255,255,0.1); color:white; border:1px solid var(--mp-gold) !important;">
                <option value="athan">أذان + إشعار</option>
                <option value="bip">رنين + إشعار</option>
            </select>
        </div>
        <button class="mp-btn" style="background:var(--mp-gold); color:var(--mp-dark);" onclick="enableNotifs()">تفعيل التنبيهات</button>
        <button class="mp-btn" style="background:white; color:black;" onclick="testNotif()">تجربة (Test)</button>
        <button class="mp-btn" style="background:transparent; color:white; border:1px solid white !important;" onclick="toggleMenu()">إغلاق</button>
    </div>

    <!-- Dashboard - Informazioni caricate qui -->
    <div class="dashboard">
        <div class="dash-card">
            <span class="label-small">Data Oggi</span>
            <span class="date-hijri">13 رمضان 1447</span>
            <span style="font-size:12px; color:#666;" id="greg-date">02/03/2026</span>
        </div>
        <div class="dash-card">
            <span class="label-small" id="next-p-name">الصلاة القادمة</span>
            <span class="timer-main" id="timer-next">--:--:--</span>
        </div>
    </div>

    <div class="prayer-list" id="list-container"></div>

    <div class="hadith-footer">
        <div class="hadith-track" id="hadith-box"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        let audioUnlocked = false;
        function unlockAudio() { audioUnlocked = true; }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function enableNotifs() { Notification.requestPermission(); toggleMenu(); }

        function triggerNotif(pName) {
            if (Notification.permission === "granted") {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification("حان وقت صلاة " + pName, { body: "موعد الصلاة في باستيا أومبريا", icon: "https://cdn-icons-png.flaticon.com/512/2619/2619277.png" });
                });
            }
            const audio = new Audio(document.getElementById('notif-type').value === 'athan' ? "https://www.islamcan.com/audio/adhan/azan1.mp3" : "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
            audio.play();
        }

        function testNotif() { triggerNotif("تجربة"); }

        // Orari di oggi (02 Marzo 2026)
        const times = { f:"05:27", dh:"12:24", a:"15:29", m:"18:00", i:"19:19" };
        const pNames = { f:"الفجر", dh:"الظهر", a:"العصر", m:"المغرب", i:"العشاء" };
        const pIcons = { f:"🌅", dh:"☀️", a:"🌤️", m:"🌇", i:"🌙" };

        function update() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            const sec = now.getSeconds();

            let html = ""; let nextP = null; let nextN = "";
            for (let k in times) {
                const [h,m] = times[k].split(":");
                const pDate = new Date(); pDate.setHours(h,m,0);
                let active = (timeStr === times[k]);
                
                if (pDate > now && !nextP) { nextP = pDate; nextN = pNames[k]; }
                if (timeStr === times[k] && sec === 0 && window.lT !== k) { window.lT = k; triggerNotif(pNames[k]); }

                html += `<div class="prayer-card ${active ? 'active' : ''}">
                    <span class="p-time">${times[k]}</span>
                    <div class="p-right">
                        <span class="p-name">${pNames[k]}</span>
                        <span class="p-icon">${pIcons[k]}</span>
                    </div>
                </div>`;
            }

            // Se tutte le preghiere sono passate, imposta Fajr di domani (approssimato)
            if (nextP) {
                const diff = nextP - now;
                const hh = Math.floor(diff/3600000).toString().padStart(2,"0");
                const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,"0");
                const ss = Math.floor((diff%60000)/1000).toString().padStart(2,"0");
                document.getElementById('timer-next').innerText = `${hh}:${mm}:${ss}`;
                document.getElementById('next-p-name').innerText = "الصلاة القادمة: " + nextN;
            } else {
                document.getElementById('timer-next').innerText = "00:00:00";
                document.getElementById('next-p-name').innerText = "انتهت صلوات اليوم";
            }
            document.getElementById('list-container').innerHTML = html;
        }

        const hadiths = ["1: إنما الأعمال بالنيات", "2: بني الإسلام على خمس", "3: إن أحدكم يجمع خلقه", "4: من أحدث في أمرنا هذا فهو رد", "5: الحلال بين والحرام بين", "6: الدين النصيحة", "40: كن في الدنيا كأنك غريب"];
        document.getElementById('hadith-box').innerHTML = hadiths.map(h => `<span class="hadith-text">• ${h} </span>`).join("");

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
