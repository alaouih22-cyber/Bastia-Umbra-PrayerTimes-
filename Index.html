<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro - Bastia Umbra</title>
    
    <!-- Meta per rendere l'app "Scaricabile" anche senza manifest.json -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MuslimPro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2619/2619277.png">
    <meta name="theme-color" content="#004F3F">

    <style>
        :root {
            --mp-dark: #004F3F;
            --mp-gold: #C5A059;
            --mp-bg: #F0F2F5;
            --white: #ffffff;
        }

        /* RESET - NO STRISCIA VERDE */
        * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; outline: none !important; }
        
        body {
            background-color: var(--mp-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* HEADER */
        .header {
            width: 100%; background: var(--mp-dark);
            padding: 40px 0; text-align: center;
            border-bottom: 4px solid var(--mp-gold) !important;
            position: relative; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
        .ramadan-title { color: var(--mp-gold); font-size: 34px; font-weight: 900; }
        .menu-btn { position: absolute; left: 20px; top: 25px; color: var(--mp-gold); font-size: 35px; cursor: pointer; z-index: 100; }

        /* DASHBOARD */
        .dashboard {
            width: 92%; max-width: 450px; 
            margin: -25px 0 15px 0; 
            display: flex; gap: 10px; z-index: 10; flex-shrink: 0;
        }
        .dash-card {
            flex: 1; background: white; border-radius: 20px; padding: 15px;
            border: 1.5px solid var(--mp-gold) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1) !important;
            text-align: center;
        }
        .timer-main { font-size: 26px; font-weight: 900; color: var(--mp-dark); }
        .date-hijri { font-size: 15px; font-weight: 900; color: var(--mp-dark); display: block; margin-top: 5px; }

        /* LISTA PREGHIERE */
        .prayer-list { width: 94%; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        .prayer-card {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 22px 25px; 
            border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
        }
        .prayer-card.active { border: 2px solid var(--mp-gold) !important; background: #fdfaf3 !important; }

        .p-right { display: flex; align-items: center; gap: 15px; }
        .p-name { font-size: 24px; font-weight: 800; color: var(--mp-dark); }
        .p-icon { font-size: 30px; }
        .p-time { font-size: 25px; font-weight: 900; color: #333; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--mp-dark); z-index: 1000; transition: 0.4s;
            padding: 30px 20px; color: white;
        }
        .sidebar.open { left: 0; }
        .mp-btn { width: 100%; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        /* HADITH */
        .hadith-footer {
            width: 100%; background: var(--mp-dark);
            padding: 12px 0; border-top: 3px solid var(--mp-gold) !important;
            overflow: hidden; flex-shrink: 0;
        }
        .hadith-track { display: flex; width: max-content; animation: scroll-hadith 280s linear infinite; }
        .hadith-text { color: var(--mp-gold); font-weight: 600; font-size: 15px; white-space: nowrap; padding-left: 60px; }
        @keyframes scroll-hadith { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body onclick="unlockAudio()">

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="header">
        <h1 class="ramadan-title">رمضان مبارك</h1>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--mp-gold)">Muslim Pro</h2>
        <div style="margin-top:20px">
            <label>🔔 نوع التنبيه</label>
            <select id="notif-type" style="width:100%; padding:10px; border-radius:5px; background:rgba(255,255,255,0.1); color:white;">
                <option value="athan">أذان + إشعار</option>
                <option value="bip">رنين + إشعار</option>
            </select>
        </div>
        <button class="mp-btn" style="background:var(--mp-gold); color:var(--mp-dark);" onclick="enableNotifs()">تفعيل الإشعارات</button>
        <button class="mp-btn" style="background:white; color:black;" onclick="testNotif()">تجربة (Test)</button>
        <button class="mp-btn" style="background:transparent; color:white; border:1px solid white !important;" onclick="toggleMenu()">إغلاق</button>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <small>Data Oggi</small>
            <strong class="date-hijri">13 رمضان 1447</strong>
            <small id="greg-date">02/03/2026</small>
        </div>
        <div class="dash-card">
            <small id="next-name">الصلاة القادمة</small>
            <div class="timer-main" id="timer-next">00:00:00</div>
        </div>
    </div>

    <div class="prayer-list" id="list-container"></div>

    <div class="hadith-footer">
        <div class="hadith-track">
            <div class="hadith-text">• 1: إنما الأعمال بالنيات • 2: بني الإسلام على خمس • 3: إن أحدكم يجمع خلقه • 4: من أحدث في أمرنا هذا • 5: الحلال بين والحرام بين • 6: الدين النصيحة • 40: كن في الدنيا كأنك غريب •</div>
        </div>
    </div>

    <script>
        let audioUnlocked = false;
        function unlockAudio() { audioUnlocked = true; }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function enableNotifs() {
            if ("Notification" in window) {
                Notification.requestPermission().then(p => { if(p==='granted') alert("✅ Attivate!"); });
            }
            toggleMenu();
        }

        function triggerNotif(title) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: "Bastia Umbra - موعد الصلاة الآن", icon: "https://cdn-icons-png.flaticon.com/512/2619/2619277.png" });
            }
            const audio = new Audio(document.getElementById('notif-type').value === 'athan' ? "https://www.islamcan.com/audio/adhan/azan1.mp3" : "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
            audio.play();
        }

        function testNotif() { triggerNotif("تجربة Muslim Pro"); }

        const times = { f:"05:27", dh:"12:24", a:"15:29", m:"18:00", i:"19:19" };
        const pNames = { f:"الفجر", dh:"الظهر", a:"العصر", m:"المغرب", i:"العشاء" };
        const pIcons = { f:"🌅", dh:"☀️", a:"🌤️", m:"🌇", i:"🌙" };

        function update() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            let html = ""; let nextP = null; let nextN = "";

            for (let k in times) {
                const [h,m] = times[k].split(":");
                const pDate = new Date(); pDate.setHours(h,m,0);
                if (pDate > now && !nextP) { nextP = pDate; nextN = pNames[k]; }
                if (timeStr === times[k] && now.getSeconds() === 0 && window.l !== k) { window.l = k; triggerNotif("صلاة " + pNames[k]); }

                html += `<div class="prayer-card ${timeStr === times[k] ? 'active' : ''}">
                    <span class="p-time">${times[k]}</span>
                    <div class="p-right">
                        <span class="p-name">${pNames[k]}</span>
                        <span class="p-icon">${pIcons[k]}</span>
                    </div>
                </div>`;
            }
            if (nextP) {
                const diff = nextP - now;
                document.getElementById('timer-next').innerText = new Date(diff).toISOString().substr(11, 8);
                document.getElementById('next-name').innerText = "الصلاة القادمة: " + nextN;
            }
            document.getElementById('list-container').innerHTML = html;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
